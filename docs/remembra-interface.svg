<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#0f1419"/>
  
  <!-- Title bar simulation -->
  <rect x="20" y="20" width="760" height="40" rx="8" fill="#1a1f2e" stroke="#2a3142" stroke-width="1"/>
  <circle cx="45" cy="40" r="6" fill="#ef4444"/>
  <circle cx="65" cy="40" r="6" fill="#f59e0b"/>
  <circle cx="85" cy="40" r="6" fill="#22c55e"/>
  <text x="400" y="45" text-anchor="middle" fill="#e4e4e7" font-family="system-ui, sans-serif" font-size="14" font-weight="600">REMEMBRA Web Interface</text>
  <rect x="700" y="30" width="60" height="20" rx="10" fill="#00d4aa" opacity="0.2"/>
  <circle cx="715" cy="40" r="4" fill="#00d4aa"/>
  <text x="740" y="44" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="10">ONLINE</text>
  
  <!-- Main container -->
  <rect x="20" y="70" width="760" height="410" rx="8" fill="#0d1117" stroke="#2a3142" stroke-width="1"/>
  
  <!-- LEFT SIDEBAR -->
  <rect x="30" y="80" width="200" height="390" rx="6" fill="#1a1f2e" filter="url(#cardShadow)"/>
  <text x="130" y="105" text-anchor="middle" fill="#7c3aed" font-family="system-ui, sans-serif" font-size="12" font-weight="600">LEFT SIDEBAR</text>
  
  <!-- Memory section -->
  <rect x="40" y="120" width="180" height="100" rx="4" fill="#252b3b" stroke="#3f3f46" stroke-width="1"/>
  <text x="50" y="140" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="11" font-weight="500">◇ Memory</text>
  <rect x="50" y="152" width="70" height="16" rx="3" fill="#7c3aed" opacity="0.3"/>
  <text x="55" y="164" fill="#a1a1aa" font-family="monospace" font-size="8">EPISODE</text>
  <text x="50" y="182" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">View stored memories</text>
  <text x="50" y="195" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">Filter by type, search</text>
  <text x="50" y="208" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">Manage & delete</text>
  
  <!-- Thoughts section -->
  <rect x="40" y="230" width="180" height="80" rx="4" fill="#252b3b" stroke="#3f3f46" stroke-width="1"/>
  <text x="50" y="250" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="11" font-weight="500">◇ Thoughts</text>
  <text x="50" y="272" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">AI Reflections</text>
  <rect x="50" y="282" width="160" height="20" rx="3" fill="#1a1f2e"/>
  <text x="55" y="296" fill="#52525b" font-family="system-ui, sans-serif" font-size="8" font-style="italic">Idle thoughts appear here...</text>
  
  <!-- Profiles section -->
  <rect x="40" y="320" width="180" height="60" rx="4" fill="#252b3b" stroke="#3f3f46" stroke-width="1"/>
  <text x="50" y="340" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="11" font-weight="500">◇ Profiles</text>
  <text x="50" y="360" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">Manage personas</text>
  <text x="50" y="373" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">LLM providers</text>
  
  <!-- Confidence bar visualization -->
  <rect x="40" y="390" width="180" height="30" rx="4" fill="#252b3b"/>
  <rect x="50" y="400" width="100" height="6" rx="3" fill="#1a1f2e"/>
  <rect x="50" y="400" width="84" height="6" rx="3" fill="#00d4aa"/>
  <text x="160" y="407" fill="#52525b" font-family="monospace" font-size="9">84%</text>
  <text x="50" y="418" fill="#52525b" font-family="system-ui, sans-serif" font-size="8">confidence</text>
  
  <!-- MAIN CHAT AREA -->
  <rect x="240" y="80" width="320" height="390" rx="6" fill="#1a1f2e" filter="url(#cardShadow)"/>
  <text x="400" y="105" text-anchor="middle" fill="#e4e4e7" font-family="system-ui, sans-serif" font-size="12" font-weight="600">MAIN CHAT AREA</text>
  
  <!-- Chat messages -->
  <rect x="340" y="120" width="180" height="35" rx="12" fill="#3b82f6" opacity="0.3"/>
  <text x="355" y="142" fill="#e4e4e7" font-family="system-ui, sans-serif" font-size="10">Hi! I am Mario! Who are you?</text>
  
  <rect x="260" y="165" width="240" height="50" rx="12" fill="#252b3b"/>
  <text x="275" y="182" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="9" font-weight="500">REMEMBRA</text>
  <text x="275" y="197" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="9">Nice to meet you, Mario! I'm here</text>
  <text x="275" y="209" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="9">to help facilitate our conversation...</text>
  
  <!-- More messages indication -->
  <text x="400" y="250" text-anchor="middle" fill="#52525b" font-family="system-ui, sans-serif" font-size="10">· · ·</text>
  
  <!-- Context markers legend -->
  <rect x="260" y="270" width="280" height="45" rx="4" fill="#252b3b" stroke="#3f3f46" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="275" y="290" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">↑ Messages outside context window</text>
  <text x="275" y="305" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">are visually marked (infinite scroll)</text>
  
  <!-- Features list -->
  <text x="260" y="340" fill="#52525b" font-family="system-ui, sans-serif" font-size="9">Features:</text>
  <text x="260" y="358" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">• Infinite scroll history</text>
  <text x="260" y="373" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">• Context window indicators</text>
  <text x="260" y="388" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">• Continuous timeline</text>
  
  <!-- Message input -->
  <rect x="255" y="420" width="290" height="35" rx="17" fill="#252b3b" stroke="#3f3f46" stroke-width="1"/>
  <text x="275" y="442" fill="#52525b" font-family="system-ui, sans-serif" font-size="10">Type a message...</text>
  <circle cx="520" cy="437" r="12" fill="#00d4aa" opacity="0.8"/>
  <text x="520" y="441" text-anchor="middle" fill="#0f1419" font-family="system-ui, sans-serif" font-size="10">→</text>
  
  <!-- RIGHT SIDEBAR -->
  <rect x="570" y="80" width="200" height="390" rx="6" fill="#1a1f2e" filter="url(#cardShadow)"/>
  <text x="670" y="105" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="12" font-weight="600">RIGHT SIDEBAR</text>
  
  <!-- Context section -->
  <rect x="580" y="120" width="180" height="130" rx="4" fill="#252b3b" stroke="#3f3f46" stroke-width="1"/>
  <text x="590" y="140" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="11" font-weight="500">◇ Context</text>
  <text x="590" y="160" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">Context window: 24</text>
  <text x="590" y="178" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">Recent messages: 2 / 24</text>
  <text x="590" y="196" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">Prompt lines: 34</text>
  <text x="590" y="214" fill="#71717a" font-family="system-ui, sans-serif" font-size="9">Prompt chars: 1,318</text>
  <rect x="590" y="225" width="160" height="18" rx="3" fill="#1a1f2e"/>
  <text x="600" y="238" fill="#52525b" font-family="monospace" font-size="8">System Prompt ▾</text>
  
  <!-- Events section -->
  <rect x="580" y="260" width="180" height="130" rx="4" fill="#252b3b" stroke="#3f3f46" stroke-width="1"/>
  <text x="590" y="280" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="11" font-weight="500">◇ Events</text>
  <text x="590" y="298" fill="#52525b" font-family="system-ui, sans-serif" font-size="9">All Events ▾</text>
  
  <!-- Event entries -->
  <rect x="590" y="308" width="160" height="18" rx="2" fill="#1a1f2e"/>
  <text x="595" y="320" fill="#52525b" font-family="monospace" font-size="7">00:12:31</text>
  <rect x="640" y="310" width="55" height="14" rx="2" fill="#22c55e" opacity="0.2"/>
  <text x="645" y="320" fill="#22c55e" font-family="monospace" font-size="7">CHAT_COMPLETED</text>
  
  <rect x="590" y="330" width="160" height="18" rx="2" fill="#1a1f2e"/>
  <text x="595" y="342" fill="#52525b" font-family="monospace" font-size="7">00:12:20</text>
  <rect x="640" y="332" width="50" height="14" rx="2" fill="#3b82f6" opacity="0.2"/>
  <text x="645" y="342" fill="#3b82f6" font-family="monospace" font-size="7">CONTEXT_BUILT</text>
  
  <rect x="590" y="352" width="160" height="18" rx="2" fill="#1a1f2e"/>
  <text x="595" y="364" fill="#52525b" font-family="monospace" font-size="7">00:12:08</text>
  <rect x="640" y="354" width="65" height="14" rx="2" fill="#7c3aed" opacity="0.2"/>
  <text x="645" y="364" fill="#7c3aed" font-family="monospace" font-size="7">EPISODE_COMPACTED</text>
  
  <!-- Observability note -->
  <rect x="580" y="400" width="180" height="60" rx="4" fill="#252b3b" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="590" y="420" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="9" font-weight="500">Full Observability</text>
  <text x="590" y="438" fill="#71717a" font-family="system-ui, sans-serif" font-size="8">Watch system decisions</text>
  <text x="590" y="450" fill="#71717a" font-family="system-ui, sans-serif" font-size="8">in real-time</text>
  
  <!-- Version tag -->
  <text x="760" y="490" text-anchor="end" fill="#52525b" font-family="monospace" font-size="9">REMEMBRA v0.1</text>
</svg>
